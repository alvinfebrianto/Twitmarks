name = "twitmarks"
compatibility_date = "2025-02-26"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

main = "dist/_worker.js/index.js"

[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "twitmarks-db"
# Replace with your actual D1 database ID after running: npm run db:create
database_id = "8cffd895-a11e-4303-be53-07686c59d23c"
